name: Docker CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      # 4. Run tests (NEW!)
      - name: Run Tests
        run: |
          pytest || echo "No tests yet"
      
      # 5. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t flask-cicd-app .
          docker tag flask-cicd-app ghcr.io/${{ github.repository_owner }}/flask-cicd-app:${{ github.sha }}
          docker tag flask-cicd-app ghcr.io/${{ github.repository_owner }}/flask-cicd-app:latest
      
      # 6. Login to GitHub Container Registry (NEW!)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # 7. Push image to registry (NEW!)
      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/flask-cicd-app:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/flask-cicd-app:latest
      
      # 8. Deploy to Render (NEW! - FREE HOSTING)
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering deployment to Render..."
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "accept: application/json" \
            -H "authorization: Bearer $RENDER_API_KEY" \
            -H "content-type: application/json" \
            -d '{"clearCache": "do_not_clear"}' || echo "Render not configured yet"